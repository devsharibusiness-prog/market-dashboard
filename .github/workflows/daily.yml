name: Daily Market Fetch

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python fetch_data.py
      - run: python suggest.py
      - name: Commit refreshed data
        run: |
          git config user.name "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json suggestions.json market.json signal_history.json
          git commit -m "Daily refresh $(date -u)" || echo "no changes"
          git push
