name: Daily Market Fetch

on:
  schedule:
    # 13:00 UTC daily, Mon–Fri = 6:30 PM IST = ~9:00 AM ET (standard time).
    # Cron is ALWAYS in UTC. See Phase 4 for how to change this time.
    - cron: '30 12 * * 1-5'
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python fetch_data.py
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      - name: Commit refreshed data.json
        run: |
          git config user.name "market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git commit -m "Daily data refresh $(date -u)" || echo "no changes"
          git push
